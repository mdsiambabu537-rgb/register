<body class="h-screen flex items-center justify-center bg-gray-200">

  <!-- REGISTER PAGE -->
  <div id="registerPage" class="w-[400px] bg-white p-8 rounded-2xl shadow-2xl">

    <h1 class="text-5xl font-bold mb-8">
      Register
    </h1>

    <form id="registerForm" class="space-y-6">

      <input type="text" id="username" placeholder="Username" class="w-full border-b-2 p-2 outline-none" required="">

      <input type="email" id="email" placeholder="Email" class="w-full border-b-2 p-2 outline-none" required="">

      <input type="password" id="password" placeholder="Password" class="w-full border-b-2 p-2 outline-none" required="">

      <input type="text" id="address" placeholder="Address" class="w-full border-b-2 p-2 outline-none" required="">

      <button type="submit" class="w-full bg-green-700 text-white py-3 rounded-xl text-3xl font-bold hover:bg-green-800">
        Register
      </button>

    </form>

  </div>

  <!-- SUCCESS PAGE -->
  <div id="successPage" class="hidden w-[500px] bg-white p-8 rounded-2xl shadow-2xl">

    <h1 class="text-5xl font-bold text-green-700 mb-8">
      Submitted Data
    </h1>

    <div class="space-y-5">

      <div>
        <label class="font-bold text-xl">Username</label>
        <input type="text" id="showUsername" class="w-full border p-3 rounded-lg mt-2">
      </div>

      <div>
        <label class="font-bold text-xl">Email</label>
        <input type="email" id="showEmail" class="w-full border p-3 rounded-lg mt-2">
      </div>

      <div>
        <label class="font-bold text-xl">Password</label>
        <input type="text" id="showPassword" class="w-full border p-3 rounded-lg mt-2">
      </div>

      <div>
        <label class="font-bold text-xl">Address</label>
        <input type="text" id="showAddress" class="w-full border p-3 rounded-lg mt-2">
      </div>

      <button id="editBtn" class="w-full bg-blue-700 text-white py-3 rounded-xl text-2xl font-bold hover:bg-blue-800">
        Save Edit
      </button>

    </div>

  </div>

  <script>

    const registerForm = document.getElementById("registerForm");

    const registerPage = document.getElementById("registerPage");
    const successPage = document.getElementById("successPage");

    registerForm.addEventListener("submit", function(e){

      e.preventDefault();

      // input values
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const address = document.getElementById("address").value;

      // show another page
      registerPage.classList.add("hidden");
      successPage.classList.remove("hidden");

      // show data
      document.getElementById("showUsername").value = username;
      document.getElementById("showEmail").value = email;
      document.getElementById("showPassword").value = password;
      document.getElementById("showAddress").value = address;

    });

    // edit button
    document.getElementById("editBtn").addEventListener("click", function(){

      alert("Data Updated Successfully");

    });

  </script>
